service: pencieve

image: liaiv/pencieve-frontend

servers:
  web:
    - 81.26.191.237

proxy:
  ssl: true
  host: 81-26-191-237.sslip.io
  app_port: 80
  healthcheck:
    path: /
    interval: 5
    timeout: 5

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ./frontend
  dockerfile: ./frontend/Dockerfile
  args:
    VITE_API_BASE_URL: /api
    VITE_API_URL: /api

env:
  clear:
    BACKEND_UPSTREAM: pencieve-backend:8000

accessories:
  backend:
    image: ghcr.io/liaiv/pencieve-backend:latest
    host: 81.26.191.237
    env:
      clear:
        POSTGRES_HOST: pencieve-db
        POSTGRES_PORT: "5432"
        POSTGRES_DB: pencieve
        POSTGRES_USER: pencieve
        IS_PRODUCTION: "true"
        CSRF_ENABLED: "true"
        WEB_CONCURRENCY: "2"
        API_PREFIX: /api
        FRONTEND_URL: https://81-26-191-237.sslip.io
        BACKEND_URL: https://81-26-191-237.sslip.io
        VK_CLIENT_ID: ""
        VK_CLIENT_SECRET: ""
        VK_REDIRECT_URI: https://81-26-191-237.sslip.io/api/auth/vk/callback
        YANDEX_REDIRECT_URI: https://81-26-191-237.sslip.io/api/auth/yandex/callback
      secret:
        - SECRET_KEY
        - POSTGRES_PASSWORD
        - YANDEX_CLIENT_ID
        - YANDEX_CLIENT_SECRET
    volumes:
      - pencieve_uploads:/app/uploads

  db:
    image: postgres:17
    host: 81.26.191.237
    env:
      clear:
        POSTGRES_DB: pencieve
        POSTGRES_USER: pencieve
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - pencieve_pg_data:/var/lib/postgresql/data

ssh:
  user: deploy
  key_data:
    - SSH_PRIVATE_KEY
  keys_only: true
