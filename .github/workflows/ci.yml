name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint (информационно, не блокирует)
        run: npm run lint
        continue-on-error: true
      - name: Production build (Vite)
        run: npm run build

  backend:
    name: Backend (deps + smoke import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Совместимость зависимостей
        run: pip check
      - name: Smoke-импорт приложения
        env:
          SECRET_KEY: ci_dummy_secret_key_at_least_32_chars_long
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        run: python -c "import app.main; print('import OK')"
      - name: Backend unit tests
        run: pytest -q tests/unit

  docker-build:
    name: Docker build (оба образа, без push)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_API_URL=/api
