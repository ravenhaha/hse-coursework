[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = -ra --strict-markers --strict-config
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: модульные тесты (изолированный слой, без БД/сети)
    integration: интеграционные тесты (БД/HTTP-клиент/файловая система)
